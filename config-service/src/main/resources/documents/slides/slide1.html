<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Airline Seat Reservation System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&amp;family=Roboto+Mono:wght@400;500&amp;family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .tech-icon {
            filter: grayscale(100%) opacity(0.7);
            transition: all 0.3s ease;
        }
        .tech-icon:hover {
            filter: grayscale(0%) opacity(1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="m-0 p-0 bg-gray-900 text-white overflow-hidden">
<!-- Main Slide Container -->
<div class="w-[1280px] h-[720px] relative bg-[#0A1628] flex flex-col items-center justify-center overflow-hidden font-['Inter']">
<!-- Decorative Background: World Map / Connections -->
<div class="absolute inset-0 z-0 opacity-10">
<svg fill="none" height="100%" viewbox="0 0 1280 720" width="100%" xmlns="http://www.w3.org/2000/svg">
<!-- Abstract World Map Dots -->
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40" x="0" y="0">
<circle cx="2" cy="2" fill="#FFFFFF" fill-opacity="0.3" r="1"></circle>
</pattern>
<rect fill="url(#grid)" height="720" width="1280"></rect>
<!-- Flight Paths -->
<path d="M-100 400 Q 300 100 640 360 T 1380 300" fill="none" stroke="#14b8a6" stroke-dasharray="10 10" stroke-width="2"></path>
<path d="M-100 500 Q 400 600 800 300 T 1380 500" fill="none" opacity="0.6" stroke="#f97316" stroke-width="2"></path>
<circle cx="640" cy="360" fill="none" r="300" stroke="white" stroke-opacity="0.1" stroke-width="1"></circle>
<circle cx="640" cy="360" fill="none" r="450" stroke="white" stroke-opacity="0.05" stroke-width="1"></circle>
</svg>
</div>
<!-- Geometric Accents -->
<div class="absolute top-0 right-0 w-64 h-64 bg-[#14b8a6] opacity-10 rounded-bl-full filter blur-3xl"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-[#0A1628] opacity-10 rounded-tr-full filter blur-3xl"></div>
<!-- Main Content Wrapper -->
<div class="z-10 text-center w-full max-w-5xl px-8 flex flex-col items-center">
<!-- Main Title -->
<div class="relative mb-8">
<h1 class="text-7xl font-extrabold font-['Montserrat'] leading-tight tracking-tight text-white drop-shadow-lg">
                    Airline Seat <br/>
<span class="text-transparent bg-clip-text bg-white" style="-webkit-text-stroke: 1px rgba(255,255,255,0.8);">Reservation System</span>
</h1>
<!-- Decorative Underline -->
<div class="w-32 h-2 bg-gradient-to-r from-orange-500 to-red-500 mx-auto mt-6 rounded-full"></div>
<!-- Note: Since gradient CSS is discouraged, using solid color fallback if needed, but Tailwind gradients work as utility classes here. If strict no-gradient rule applies to CSS blocks, Tailwind utility is acceptable or use solid color. Using solid color below to be safe per instructions. -->
<div class="w-40 h-1.5 bg-[#f97316] mx-auto mt-6 rounded-full shadow-[0_0_15px_rgba(249,115,22,0.6)]"></div>
</div>
<!-- Subtitle -->
<div class="space-y-3 mb-12">
<p class="text-3xl font-light text-gray-200">
                    Microservices <span class="text-[#14b8a6] mx-2">+</span> Event-Driven Architecture
                </p>
<p class="text-xl text-gray-400 font-['Roboto_Mono']">
                    Spring Boot | Apache Kafka | Redis | Cloud Native
                </p>
</div>
<!-- Tech Stack Icons (Visual Only) -->
<div class="flex items-center justify-center gap-12 mt-4 p-6 glass-panel rounded-2xl w-full max-w-3xl mx-auto">
<div class="flex flex-col items-center gap-2 tech-icon">
<i class="fas fa-leaf text-4xl text-green-500"></i>
<span class="text-xs font-mono text-gray-400">Spring Boot</span>
</div>
<div class="flex flex-col items-center gap-2 tech-icon">
<i class="fas fa-project-diagram text-4xl text-white"></i>
<span class="text-xs font-mono text-gray-400">Kafka</span>
</div>
<div class="flex flex-col items-center gap-2 tech-icon">
<i class="fas fa-database text-4xl text-blue-400"></i>
<span class="text-xs font-mono text-gray-400">MySQL</span>
</div>
<div class="flex flex-col items-center gap-2 tech-icon">
<i class="fas fa-layer-group text-4xl text-red-500"></i>
<span class="text-xs font-mono text-gray-400">Redis</span>
</div>
<div class="flex flex-col items-center gap-2 tech-icon">
<i class="fas fa-cloud text-4xl text-cyan-400"></i>
<span class="text-xs font-mono text-gray-400">Cloud</span>
</div>
</div>
</div>
<!-- Footer Info -->
<div class="absolute bottom-8 w-full px-12 flex justify-between items-end z-20 text-gray-500 text-sm font-['Roboto_Mono'] border-t border-gray-800 pt-4">
<p>XYZ Airlines</p>
<p>Laxminarayan Chintake</p>
<div class="flex items-center gap-2">
<i class="fas fa-plane-departure text-[#14b8a6]"></i>
</div>
</div>
</div>
<script>
  document.addEventListener('keydown', function(event) {
    const key = event.key;
    const totalSlides = 12;
    let currentSlide = parseInt(window.location.pathname.match(/slide(\d+)\.html/)[1]);

    if (key === 'ArrowRight' || key === ' ') {
      if (currentSlide < totalSlides) {
        window.location.href = 'slide' + (currentSlide + 1) + '.html';
      }
    } else if (key === 'ArrowLeft') {
      if (currentSlide > 1) {
        window.location.href = 'slide' + (currentSlide - 1) + '.html';
      }
    }
  });
</script>
</body>
</html>
